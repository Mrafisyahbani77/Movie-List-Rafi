<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary SEO ───────────────────────────────── -->
  <title>Rafi Movies – Discover Trending & Top-Rated Films</title>
  <meta name="description"
    content="Discover the latest trending movies, top-rated hits, and all-time favourites. Browse detailed info, trailers, cast and more on Rafi Movies." />
  <meta name="keywords"
    content="movies, trending films, top rated movies, movie trailers, film cast, TMDB, watch movies online" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://rafi-movies.vercel.app/" />

  <!-- ── Open Graph / Social ───────────────────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://rafi-movies.vercel.app/" />
  <meta property="og:title" content="Rafi Movies – Discover Trending & Top-Rated Films" />

    content="Browse trending movies, top-rated hits, trailers, casts and detailed info powered by TMDB." />
  <meta property="og:image" content="https://rafi-movies.vercel.app/og-image.png" />

  <!-- ── Twitter Card ──────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Rafi Movies – Discover Trending & Top-Rated Films" />
  <meta name="twitter:description"
    content="Browse trending movies, top-rated hits, trailers, casts and detailed info powered by TMDB." />
  <meta name="twitter:image" content="https://rafi-movies.vercel.app/og-image.png" />

  <!-- ── Favicon ───────────────────────────────────── -->
  <link rel="icon" type="image/png" href="/src/assets/logo.png" />

  <!-- ── Fonts (preconnect first for speed) ───────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;900&display=swap"
    rel="stylesheet" />

  <!-- ── Theme colour (prevents flash of white/black) -->

</head>

</html>
